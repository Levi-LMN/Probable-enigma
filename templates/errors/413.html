{% extends "admin/base.html" %}
{% block content %}
<div class="max-w-md mx-auto text-center py-20">
  <i class="fas fa-file-archive text-5xl mb-4" style="color:rgba(239,68,68,0.4)"></i>
  <h1 class="text-xl font-bold mb-2">File Too Large</h1>
  <p class="text-sm muted mb-6">The backup ZIP exceeds the 200 MB upload limit.<br>
     Consider splitting your images into a smaller archive.</p>
  <a href="{{ url_for('admin.import_backup') }}" class="btn-primary px-6 py-2.5 text-sm">
    ← Try Again
  </a>
</div>
{% endblock %}
